      /* ───────── Liquid Glass — exact spec from design.md ───────── */
      .liquid-glass {

          rgba(255, 255, 255, 0.45) 0%,

      .liquid-glass-strong::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1.4px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.5) 0%,
          rgba(255, 255, 255, 0.2) 20%,
          rgba(255, 255, 255, 0) 40%,
          rgba(255, 255, 255, 0) 60%,
          rgba(255, 255, 255, 0.2) 80%,
          rgba(255, 255, 255, 0.5) 100%
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;

      /* Subtle ambient glow used for sections w/o video bg */

      @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
      .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }

      /* ───────── Liquid hover spotlight ─────────
         A mouse-tracked radial highlight that lives inside any glass element. */
      .liquid-hover { position: relative; isolation: isolate; }
      .liquid-hover::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(
          180px circle at var(--mx, 50%) var(--my, 50%),
          rgba(255, 255, 255, 0.22),
          rgba(255, 255, 255, 0.06) 35%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 220ms ease;
        pointer-events: none;
        z-index: 0;
      }
      .liquid-hover:hover::after { opacity: 1; }
      .liquid-hover > * { position: relative; z-index: 1; }

      /* Tighter, larger spotlight for prominent CTAs / nav links */
      .liquid-hover-tight::after {
        background: radial-gradient(
          90px circle at var(--mx, 50%) var(--my, 50%),
          rgba(255, 255, 255, 0.30),
          rgba(255, 255, 255, 0.08) 40%,
          transparent 70%
        );
      }

      /* Soft entrance for big section headings */
      @keyframes floatY {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .float-slow { animation: floatY 6s ease-in-out infinite; }

      /* Reveal-on-scroll accent line */
      .accent-line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      }

      /* Mobile menu animation */
      @keyframes menuIn {
        from { opacity: 0; transform: translateY(-8px); filter: blur(8px); }

      }
      .menu-in { animation: menuIn 320ms ease-out both; }

      /* ───────── Scroll reveal ───────── */
      .reveal { opacity: 0; transform: translateY(28px); filter: blur(8px);
        transition: opacity 800ms cubic-bezier(.2,.7,.2,1),

                    filter 800ms cubic-bezier(.2,.7,.2,1); }
      .reveal.in-view { opacity: 1; transform: translateY(0); filter: blur(0); }
      .reveal-delay-1 { transition-delay: 80ms; }
      .reveal-delay-2 { transition-delay: 160ms; }
      .reveal-delay-3 { transition-delay: 240ms; }
      .reveal-delay-4 { transition-delay: 320ms; }
      .reveal-delay-5 { transition-delay: 400ms; }
      .reveal-delay-6 { transition-delay: 480ms; }

      /* ───────── Animated gradient border (hover) ─────────
         Used for premium project cards. */
      .grad-border {
        position: relative;
        isolation: isolate;
      }
      .grad-border::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        padding: 1px;
        background: conic-gradient(
          from var(--ang, 0deg),
          rgba(167,139,250,0) 0deg,
          rgba(167,139,250,0.85) 90deg,
          rgba(249,115,22,0.85) 180deg,
          rgba(167,139,250,0.85) 270deg,
          rgba(167,139,250,0) 360deg
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        opacity: 0;
        transition: opacity 350ms ease;
        pointer-events: none;
        z-index: 2;
      }
      @property --ang { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
      @keyframes spinAng { to { --ang: 360deg; } }
      .grad-border:hover::after {
        opacity: 1;
        animation: spinAng 4s linear infinite;
      }

      /* ───────── Shimmer (for Hire-Me CTA) ───────── */
      @keyframes shimmer {
        0% { transform: translateX(-120%) skewX(-12deg); }
        100% { transform: translateX(220%) skewX(-12deg); }
      }
      .shimmer-on-hover { position: relative; overflow: hidden; }

        content: "";

        pointer-events: none;
        opacity: 0;

      }
      .shimmer-on-hover:hover::before { opacity: 1; animation: shimmer 1.1s ease-out; }

      /* ───────── Aurora background (Connect section) ───────── */
      @keyframes auroraShift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(2%, -3%, 0) scale(1.06); }
      }
      .aurora {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .aurora::before, .aurora::after {
        content: "";

        height: 60vw;
        max-width: 900px;
        max-height: 900px;
        border-radius: 9999px;

      }
      .aurora::before {
        background: radial-gradient(closest-side, rgba(167,139,250,0.55), transparent 70%);

        left: -10%;
      }
      .aurora::after {
        background: radial-gradient(closest-side, rgba(249,115,22,0.40), transparent 70%);

        right: -10%;
        animation-delay: -7s;
      }

      .dot-grid {
        background-image:
          radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);

      }

      /* ───────── Tilt-on-hover ───────── */
      .tilt {
        transform: perspective(800px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
        transition: transform 240ms ease;
        will-change: transform;
      }

      kbd.kbd {

      }

      /* Selection */
      ::selection { background: rgba(167,139,250,0.35); color: #fff; }

      /* Reduce hero typography squeeze on tiny screens */
      @media (max-width: 480px) {
        .hero-headline { letter-spacing: -2px !important; }
      }

      /* Disable heavy hover effects on touch devices */
      @media (hover: none) {
        .liquid-hover::after, .grad-border::after { display: none; }
      }

      /* ───────── Mobile-only refinements ───────── */
      /* Make all primary tap targets reach the 44px minimum */
      @media (max-width: 640px) {
        .tap-44 { min-height: 44px; }
      }

      /* Horizontally scrollable rail (e.g., stack tabs) with no scrollbar */

        scrollbar-width: none;

        .aurora::before, .aurora::after { filter: blur(60px); opacity: 0.35; }

      /* Headlines: tighten letter-spacing further on very narrow phones */
      @media (max-width: 380px) {

      /* Visually hidden but accessible to screen readers and crawlers */
      .sr-only {

        height: 1px;

    <script type="text/babel">
      const { useEffect, useRef } = React;

      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      function FadingVideo({ src, className = "", style }) {
        const videoRef = useRef(null);
        const rafRef = useRef(null);
        const fadingOutRef = useRef(false);

        useEffect(() => {
          const v = videoRef.current;
          if (!v) return;

          const fadeTo = (target, duration = FADE_MS) => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            const start = performance.now();
            const from = parseFloat(v.style.opacity || "0");
            const delta = target - from;
            const tick = (now) => {
              const t = Math.min(1, (now - start) / duration);
              const eased = t; // linear is fine for a crossfade
              v.style.opacity = String(from + delta * eased);
              if (t < 1) rafRef.current = requestAnimationFrame(tick);
            };
            rafRef.current = requestAnimationFrame(tick);
          };

          const onLoaded = () => {
            v.style.opacity = "0";
            const p = v.play();
            if (p && typeof p.catch === "function") p.catch(() => {});
            fadeTo(1);
          };

          const onTimeUpdate = () => {
            if (!fadingOutRef.current && v.duration) {
              const remaining = v.duration - v.currentTime;
              if (remaining > 0 && remaining <= FADE_OUT_LEAD) {
                fadingOutRef.current = true;
                fadeTo(0);
              }
            }
          };

          const onEnded = () => {
            v.style.opacity = "0";
            setTimeout(() => {
              try {
                v.currentTime = 0;
                const p = v.play();
                if (p && typeof p.catch === "function") p.catch(() => {});
              } catch (_) {}
              fadingOutRef.current = false;
              fadeTo(1);
            }, 100);
          };

          v.addEventListener("loadeddata", onLoaded);
          v.addEventListener("timeupdate", onTimeUpdate);
          v.addEventListener("ended", onEnded);

          return () => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            v.removeEventListener("loadeddata", onLoaded);
            v.removeEventListener("timeupdate", onTimeUpdate);
            v.removeEventListener("ended", onEnded);
          };
        }, [src]);

        return (
          <video
            ref={videoRef}
            src={src}
            autoPlay
            muted
            playsInline
            preload="auto"
            className={className}
            style={{ opacity: 0, ...style }}
          />
        );
      }

      window.FadingVideo = FadingVideo;
    </script>

    <script type="text/babel">
      const { motion } = window.Motion;
      const { useEffect: useEffectBT, useRef: useRefBT, useState: useStateBT } = React;

      function BlurText({ text, className = "", as: Tag = "p", stagger = 100 }) {
        const ref = useRefBT(null);
        const [inView, setInView] = useStateBT(false);

        useEffectBT(() => {
          if (!ref.current) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting && e.intersectionRatio >= 0.1) {
                  setInView(true);
                  obs.disconnect();
                }
              });
            },
            { threshold: [0.1] }
          );
          obs.observe(ref.current);
          return () => obs.disconnect();
        }, []);

        const words = text.split(" ");

        return (
          <Tag
            ref={ref}
            className={className}
            style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
          >
            {words.map((w, i) => (
              <motion.span
                key={`${w}-${i}`}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  inView
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : {}
                }
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: (i * stagger) / 1000,
                }}
                style={{ display: "inline-block", marginRight: "0.28em" }}
              >
                {w}
              </motion.span>
            ))}
          </Tag>
        );
      }

      window.BlurText = BlurText;
    </script>


    <!-- ─────────────────── Liquid hover hook ─────────────────── -->
    <script type="text/babel">
      // Wires --mx / --my CSS vars to the cursor position so .liquid-hover renders a spotlight.
      function useLiquidHover() {
        const ref = React.useRef(null);
        React.useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const onMove = (e) => {
            const r = el.getBoundingClientRect();
            const x = ((e.clientX - r.left) / r.width) * 100;
            const y = ((e.clientY - r.top) / r.height) * 100;
            el.style.setProperty("--mx", `${x}%`);
            el.style.setProperty("--my", `${y}%`);
          };
          el.addEventListener("mousemove", onMove);
          return () => el.removeEventListener("mousemove", onMove);
        }, []);
        return ref;
      }
      window.useLiquidHover = useLiquidHover;

      // A button-like wrapper that auto-binds the spotlight effect.
      function LiquidHover({ as: Tag = "div", className = "", tight = false, children, ...rest }) {
        const ref = useLiquidHover();
        const cls = `liquid-hover ${tight ? "liquid-hover-tight" : ""} ${className}`;
        return (
          <Tag ref={ref} className={cls} {...rest}>
            {children}
          </Tag>
        );
      }
      window.LiquidHover = LiquidHover;
    </script>

    <!-- ─────────────────── Scroll Reveal & Tilt helpers ─────────────────── -->
    <script type="text/babel">
      // Adds .in-view to its child element when scrolled into view.
      function Reveal({ as: Tag = "div", delay = 0, className = "", children, ...rest }) {
        const ref = React.useRef(null);
        React.useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  el.classList.add("in-view");
                  obs.unobserve(el);
                }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
          );
          obs.observe(el);
          return () => obs.disconnect();
        }, []);

        const delayClass = delay ? `reveal-delay-${delay}` : "";
        return (
          <Tag
            ref={ref}
            className={`reveal ${delayClass} ${className}`}
            {...rest}
          >
            {children}
          </Tag>
        );
      }
      window.Reveal = Reveal;

      // 3D tilt — sets --rx / --ry CSS vars based on cursor inside element.
      function useTilt(intensity = 6) {
        const ref = React.useRef(null);
        React.useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const onMove = (e) => {
            const r = el.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width - 0.5;
            const y = (e.clientY - r.top) / r.height - 0.5;
            el.style.setProperty("--ry", `${x * intensity}deg`);
            el.style.setProperty("--rx", `${-y * intensity}deg`);
          };
          const onLeave = () => {
            el.style.setProperty("--ry", `0deg`);
            el.style.setProperty("--rx", `0deg`);
          };
          el.addEventListener("mousemove", onMove);
          el.addEventListener("mouseleave", onLeave);
          return () => {
            el.removeEventListener("mousemove", onMove);
            el.removeEventListener("mouseleave", onLeave);
          };
        }, [intensity]);
        return ref;
      }
      window.useTilt = useTilt;

      // Magnetic — gently pulls the element toward the cursor.
      function useMagnetic(strength = 0.25) {
        const ref = React.useRef(null);
        React.useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const onMove = (e) => {
            const r = el.getBoundingClientRect();
            const x = e.clientX - (r.left + r.width / 2);
            const y = e.clientY - (r.top + r.height / 2);
            el.style.transform = `translate3d(${x * strength}px, ${y * strength}px, 0)`;
          };
          const onLeave = () => {
            el.style.transform = "translate3d(0,0,0)";
          };
          el.addEventListener("mousemove", onMove);
          el.addEventListener("mouseleave", onLeave);
          return () => {
            el.removeEventListener("mousemove", onMove);
            el.removeEventListener("mouseleave", onLeave);
          };
        }, [strength]);
        return ref;
      }
      window.useMagnetic = useMagnetic;
    </script>

          const el = ref.current;
          if (!el) return;
          const obs = new IntersectionObserver(
            ([e]) => {
              if (e.isIntersecting) {
                setShown(true);
                obs.disconnect();
              }
            },
            { threshold: 0.4 }
          );
          obs.observe(el);
          return () => obs.disconnect();
        }, []);
        return (
          <div ref={ref} className="h-[3px] bg-white/[0.06] rounded-full overflow-hidden">
            <div
              className="h-full rounded-full"

    <script type="text/babel">
      // Top-of-page scroll progress bar
      function ScrollProgress() {
        const ref = React.useRef(null);
        React.useEffect(() => {
          const el = ref.current;
          if (!el) return;
          let raf = 0;
          const onScroll = () => {
            cancelAnimationFrame(raf);
            raf = requestAnimationFrame(() => {
              const h = document.documentElement;
              const total = h.scrollHeight - h.clientHeight;
              const pct = total > 0 ? (h.scrollTop / total) * 100 : 0;
              el.style.transform = `scaleX(${pct / 100})`;
            });
          };
          onScroll();
          window.addEventListener("scroll", onScroll, { passive: true });
          return () => {
            cancelAnimationFrame(raf);
            window.removeEventListener("scroll", onScroll);
          };
        }, []);
        return (
          <div className="fixed top-0 left-0 right-0 h-[2px] z-[60] pointer-events-none">
            <div
              ref={ref}
              className="h-full origin-left"
              style={{
                background:
                  "linear-gradient(90deg, rgba(167,139,250,0.95), rgba(249,115,22,0.95))",
                transform: "scaleX(0)",
                transition: "transform 120ms linear",
              }}
            />
          </div>
        );
      }

      function App() {
        // Add scroll-margin-top so anchored sections land cleanly below the navbar.
        React.useEffect(() => {
          const sections = document.querySelectorAll("main section[id]");
          sections.forEach((s) => {
            s.style.scrollMarginTop = "84px";
          });
        }, []);

        return (
          <>
            <ScrollProgress />
            <main className="bg-black text-white" id="main">

              <window.Capabilities />
              <window.TechStack />
              <window.Work />
              <window.Services />
              <window.FAQ />
              <window.Connect />
            </main>
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
